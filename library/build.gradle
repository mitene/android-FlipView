plugins {
    id 'com.android.library'
}

android {
    compileSdk 34
    namespace 'se.emilsjolander.flipview'

    defaultConfig {
        minSdk 11
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'com.android.support:support-v4:18.0.0'
}
